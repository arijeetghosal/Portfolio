<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Hub | Arijeet Ghosal</title>
    <meta name="description" content="Categorized AI, Data Engineering, and Data Analysis projects directory of Arijeet Ghosal.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="projects-page-body">

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- Neural Network Background Canvas -->
    <canvas class="neural-canvas" id="neural-canvas"></canvas>

    <!-- Click Particles Canvas -->
    <canvas class="click-canvas" id="click-canvas"></canvas>

    <!-- Custom Cursor -->
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
    </button>

    <!-- Navigation Header -->
    <nav class="nav scrolled">
        <div class="nav-brand">
            <span class="brand-bracket">&lt;</span>
            <span class="brand-name">AG</span>
            <span class="brand-bracket">/&gt;</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">← Back to Profile</a>
            <a href="projects.html" class="nav-link active">Project Archive</a>
            <a href="services.html" class="nav-link">Services</a>
        </div>
    </nav>

    <!-- Hub Header -->
    <section class="hub-hero" id="home">
        <div class="hub-hero-content">
            <span class="section-tag">&gt; index_directories...</span>
            <h1 class="hub-title">Project <span class="accent">Directory</span></h1>
            <p class="hub-subtitle">Explore categorized AI, Data Engineering, and Analytics systems.</p>
        </div>
    </section>

    <!-- Project Hub Section -->
    <section class="section" id="projects-hub">
        <div class="section-container">
            
            <!-- Filter Controls -->
            <div class="hub-controls">
                <!-- Search -->
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="hubSearch" placeholder="Filter by technology, keyword, or tool...">
                </div>

                <!-- Tabs -->
                <div class="filter-tabs" id="filterTabs">
                    <button class="tab-btn active" data-filter="all">All Modules</button>
                    <button class="tab-btn" data-filter="data-eng">Data Engineering</button>
                    <button class="tab-btn" data-filter="data-analysis">Data Analysis</button>
                    <button class="tab-btn" data-filter="visualization">Analysis & Vis</button>
                    <button class="tab-btn" data-filter="reporting">Reporting & Docs</button>
                    <button class="tab-btn" data-filter="ai-ml">AI / ML</button>
                </div>
            </div>

            <!-- Dynamic Projects Catalog -->
            <div class="hub-catalog" id="hubCatalog">
                <!-- Projects will be dynamically generated by JS -->
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="brand-bracket">&lt;</span>
                <span class="brand-name">Arijeet Ghosal</span>
                <span class="brand-bracket">/&gt;</span>
            </div>
            <p class="footer-text">Structured data systems. Scalable intelligence.</p>
            <p class="footer-copyright">© 2026 Arijeet Ghosal. All rights reserved.</p>
        </div>
    </footer>

    <!-- SVG Definitions -->
    <svg style="position:absolute;width:0;height:0;">
        <defs>
            <linearGradient id="certGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>

    <script src="projects.js"></script>
</body>
</html>
